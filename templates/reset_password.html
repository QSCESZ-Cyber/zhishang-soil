<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码</title>
    <link rel="shortcut icon" href="../static/logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: url('/static/123.png') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: inherit;
    filter: blur(5px);
    opacity: 0.8;
    z-index: -1;
}

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            box-shadow: 0 14px 28px rgba(0, 0, 0, 0.25),
                        0 10px 10px rgba(0, 0, 0, 0.22);
            padding: 40px 30px;
            width: 360px;
            text-align: center;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        .subtitle {
            font-size: 13px;
            color: #666;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .input-group label {
            font-size: 14px;
            color: #333;
            display: block;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            background-color: #eee;
            border: none;
            border-radius: 5px;
            font-size: 14px;
        }

        /* 验证码行，和登录页按钮风格对齐 */
        .code-row {
            display: flex;
            gap: 10px;
        }

        .code-row input {
            flex: 1;
        }

        .get-code-btn {
            background-color: #34A853;
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
            transition: background-color 0.2s;
        }

        .get-code-btn:hover {
            background-color: #2E8B57;
        }

        .submit-btn {
            background-color: #34A853;
            color: #FFFFFF;
            border: none;
            padding: 12px 45px;
            border-radius: 20px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        .submit-btn:hover {
            background-color: #2E8B57;
        }

        .back-link {
            display: block;
            margin-top: 20px;
            font-size: 13px;
            color: #34A853;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1 class="title">修改密码</h1>
        <p class="subtitle">亲，请输入你要修改的密码</p >

        <form action="/reset_password" method="post">
            <div class="input-group">
                <input type="password" name="new_password" placeholder="请填写修改后的密码" required>
            </div>

            <div class="input-group">
                <div class="code-row">
                    <input type="password" name="confirm_password" placeholder="请确认密码" required>
                </div>
            </div>

            <button type="submit" class="submit-btn">确认</button>
        </form>


    </div>

</body>
</html>
