<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 知墒土壤监测系统</title>
  <link rel="shortcut icon" href="/static/logo.png">
    <style>
        :root {
            --blue: #4A90E2;
            --green: #4CAF50;
            --red: #d93025;
            --gray: #666;
            --card: rgba(255,255,255,0.97);
            --border: #ddd;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }
        body {
            overflow-x: hidden;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 999;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo img {
            width: 46px;
            height: 46px;
            border-radius: 50%;
        }
        .logo-text {
            font-size: 22px;
            font-weight: bold;
        }
        .logo-text .subtitle {
            font-size: 14px;
            color: #666;
            font-weight: normal;
        }
        .nav-links {
            display: flex;
            gap: 22px;
            align-items: center;
        }
        .nav-links a {
            font-size: 14px;
            color: #333;
            text-decoration: none;
        }
        .nav-links a.active {
            color: var(--blue);
            font-weight: 500;
        }
        .logout-btn {
            padding: 5px 12px;
            border: 1px solid var(--red);
            background: #fff;
            color: var(--red);
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
        }

        .hero {
            width: 100%;
            min-height: 100vh;
            position: relative;
            padding-top: 90px;
            padding-bottom: 40px;
        }
        .hero-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        .hero-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .profile-card {
            background: var(--card);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #eee;
            overflow: hidden;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .avatar:hover::after {
            content: '更换';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0,0,0,0.4);
            color: #fff;
            font-size: 12px;
            text-align: center;
            padding: 2px 0;
        }
        .profile-info {
            flex: 1;
        }
        .profile-info .name {
            font-size: 20px;
            font-weight: 600;
            color: #222;
            margin-bottom: 4px;
        }
        .profile-info .device-count {
            font-size: 14px;
            color: var(--gray);
        }
        .menu-card {
            background: var(--card);
            border-radius: 16px;
            padding: 20px 0;
            box-shadow: 0 3px 10px rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }
        .menu-title {
            font-size: 14px;
            color: #888;
            padding: 0 20px 10px;
            border-bottom: 1px solid #eee;
        }
        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .menu-item:hover {
            background: #f8f8f8;
        }
        .menu-item .left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .menu-item .icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--blue);
        }
        .menu-item .text {
            font-size: 15px;
            color: #333;
        }
        .menu-item .arrow {
            color: #ccc;
        }
        .logout-section {
            margin-top: 20px;
        }
        .logout-btn-big {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: var(--red);
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #fff;
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
        }
        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .modal-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        .modal-btn.confirm {
            background: var(--blue);
            color: #fff;
        }
        .modal-btn.cancel {
            background: #eee;
            color: #333;
        }
    </style>
</head>
<body>

<div class="navbar">
  <div class="logo">
    <img src="../static/logo.jpg" alt="logo">
    <span class="logo-text">知墒 <span class="subtitle">土壤监测系统</span></span>
  </div>
  <div class="nav-links">
    <a href="/home_page">首页</a>
    <a href="/device_selector">我的设备</a>
    <a href="/add_device">添加设备</a>
    <a href="/device">设备简介</a>
    <a href="/my" class="active">个人中心</a>
    <button class="logout-btn" onclick="logout()">退出登录</button>
  </div>
</div>

<div class="hero">
  <div class="hero-bg">
    <img src="../static/soil-bg.png" alt="背景">
  </div>

  <div class="container">
    <div class="profile-card">
      <div class="avatar" onclick="document.getElementById('avatarInput').click()">
        <img id="avatarImg" src="{% if avatar %}{{ avatar }}{% else %}data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI1MCIgZmlsbD0iIzRBOTBFMiIvPjxjaXJjbGUgY3g9IjUwIiBjeT0iNDAiIHI9IjE1IiBmaWxsPSJ3aGl0ZSIvPjxwYXRoIGQ9Ik0yNSA4MGMwLTE2LjYgMTMuNC0zMCAzMC0zMHMzMCAxMy40IDMwIDMwIiBmaWxsPSJ3aGl0ZSIvPjwvc3ZnPg=={% endif %}" alt="头像">
      </div>
      <input type="file" id="avatarInput" accept="image/*" style="display:none;">

      <div class="profile-info">
        <div class="name">{{ nickname }}</div>
        <div class="device-count">已绑定设备：{{ device_count }} 台</div>
      </div>
    </div>

    <div class="menu-card">
      <div class="menu-title">设备管理</div>
      <div class="menu-item" onclick="location.href='/device_selector'">
        <div class="left"><div class="icon">📱</div><div class="text">我的设备</div></div>
        <div class="arrow">›</div>
      </div>
      <div class="menu-item" onclick="location.href='/add_device'">
        <div class="left"><div class="icon">➕</div><div class="text">添加设备</div></div>
        <div class="arrow">›</div>
      </div>
      <div class="menu-item">
        <div class="left"><div class="icon">📊</div><div class="text">数据导出</div></div>
        <div class="arrow">›</div>
      </div>
    </div>

    <div class="menu-card">
      <div class="menu-title">账号设置</div>
      <div class="menu-item" onclick="openEditModal()">
        <div class="left"><div class="icon">✏️</div><div class="text">修改个人信息</div></div>
        <div class="arrow">›</div>
      </div>
      <div class="menu-item" onclick="openChangePwdModal()">
        <div class="left"><div class="icon">🔒</div><div class="text">修改密码</div></div>
        <div class="arrow">›</div>
      </div>
    </div>

    <div class="menu-card">
      <div class="menu-title">关于系统</div>
      <div class="menu-item">
        <div class="left"><div class="icon">ℹ️</div><div class="text">系统版本</div></div>
        <div class="arrow">v1.0.0</div>
      </div>
      <div class="menu-item" onclick="openUsageGuideModal()">
        <div class="left"><div class="icon">📖</div><div class="text">使用说明</div></div>
        <div class="arrow">›</div>
      </div>
    </div>

    <div class="logout-section">
      <button class="logout-btn-big" onclick="logout()">退出登录</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="editProfileModal">
  <div class="modal-content">
    <div class="modal-title">修改个人信息</div>
    <form method="post" action="/edit_nickname">
      <div class="form-group">
        <label>昵称</label>
        <input type="text" name="nickname" value="{{ nickname }}" required>
      </div>
      <div class="modal-actions">
        <button type="button" class="modal-btn cancel" onclick="closeEditModal()">取消</button>
        <button type="submit" class="modal-btn confirm">保存</button>
      </div>
    </form>
  </div>
</div>

<div class="modal-overlay" id="usageGuideModal">
  <div class="modal-content">
    <div class="modal-title">使用说明</div>
    <div style="font-size:14px;line-height:1.6;">
      <p>1. 进入「我的设备」查看实时数据与历史趋势。</p>
      <p>2. 在「添加设备」中绑定新设备。</p>
      <p>3. 「数据导出」可下载设备历史数据。</p>
      <p>4. 若有问题，请联系管理员。</p>
    </div>
    <div class="modal-actions">
      <button class="modal-btn confirm" onclick="closeUsageGuideModal()">我知道了</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="changePwdModal">
  <div class="modal-content">
    <div class="modal-title">修改密码</div>
    <form id="changePwdForm">
      <div class="form-group">
        <label>当前密码</label>
        <input type="password" id="old_pwd" required>
      </div>
      <div class="form-group">
        <label>新密码</label>
        <input type="password" id="new_pwd" required>
      </div>
      <div class="modal-actions">
        <button type="button" class="modal-btn cancel" onclick="closeChangePwdModal()">取消</button>
        <button type="submit" class="modal-btn confirm">确认修改</button>
      </div>
    </form>
  </div>
</div>

<script>
document.getElementById('avatarInput').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(e){
    const avatarBase64 = e.target.result;
    document.getElementById('avatarImg').src = avatarBase64;

    fetch('/upload_avatar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ avatar: avatarBase64 })
    });
  };
  reader.readAsDataURL(file);
});

function openEditModal(){ document.getElementById('editProfileModal').style.display = 'flex'; }
function closeEditModal(){ document.getElementById('editProfileModal').style.display = 'none'; }

function openUsageGuideModal(){ document.getElementById('usageGuideModal').style.display = 'flex'; }
function closeUsageGuideModal(){ document.getElementById('usageGuideModal').style.display = 'none'; }

function openChangePwdModal(){ document.getElementById('changePwdModal').style.display = 'flex'; }
function closeChangePwdModal(){
  document.getElementById('changePwdModal').style.display = 'none';
  document.getElementById('changePwdForm').reset();
}

document.getElementById('changePwdForm').addEventListener('submit', async e => {
  e.preventDefault();
  const old = document.getElementById('old_pwd').value;
  const neo = document.getElementById('new_pwd').value;
  const r = await fetch('/do_change_password', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: `old_pwd=${old}&new_pwd=${neo}`
  });
  const d = await r.json();
  if(d.ok){ alert("✅ 修改成功"); closeChangePwdModal(); }
  else{ alert("❌ 失败："+d.msg); }
});

function logout(){ if(confirm("确定退出？")) location.href="/logout"; }

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.onclick = e => { if(e.target === m) m.style.display='none'; }
});
</script>
</body>
</html>
