<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码</title>
    <link rel="shortcut icon" href="../static/logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: url('/static/123.png') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: inherit;
            filter: blur(5px);
            opacity: 0.8;
            z-index: -1;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            box-shadow: 0 14px 28px rgba(0, 0, 0, 0.25),
                        0 10px 10px rgba(0, 0, 0, 0.22);
            padding: 40px 30px;
            width: 360px;
            text-align: center;
        }
        .title { font-size: 20px; font-weight: bold; margin-bottom: 10px; color: #333; }
        .subtitle { font-size: 13px; color: #666; margin-bottom: 30px; }
        .input-group { margin-bottom: 18px; text-align: left; }
        .input-group input {
            width: 100%; padding: 12px 15px;
            background-color: #eee; border: none; border-radius: 5px; font-size: 14px;
        }
        .code-row { display: flex; gap: 10px; }
        .code-row input { flex: 1; }
        .get-code-btn {
            background-color: #34A853; color: white; border: none;
            padding: 0 15px; border-radius: 5px; cursor: pointer; font-size: 13px;
        }
        .submit-btn {
            background-color: #34A853; color: #FFF; border: none;
            padding: 12px 45px; border-radius: 20px; font-weight: bold;
            width: 100%; margin-top: 10px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1 class="title">忘记密码</h1>
        <p class="subtitle">输入手机号和验证码重置密码</p>

        <div class="input-group">
            <input type="tel" id="phone" placeholder="请输入手机号" required>
        </div>
        <div class="input-group">
            <div class="code-row">
                <input type="text" id="code" placeholder="请输入验证码" required>
                <button class="get-code-btn" id="getCodeBtn" onclick="sendForgotCode()">获取验证码</button>
            </div>
        </div>
        <button class="submit-btn" onclick="verifyCode()">下一步</button>
    </div>

    <script>
    async function sendForgotCode() {
        const phone = document.getElementById('phone').value.trim();
        if (!phone) {
            alert('请先输入手机号');
            return;
        }

        try {
            const res = await fetch('/send_code', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: new URLSearchParams({ phone, type: 'forget' })
            });
            const data = await res.json();
            alert(data.msg);
        } catch (e) {
            console.error("请求失败：", e);
            alert("发送失败，请检查后端是否启动");
        }
    }


// 验证验证码
async function verifyCode() {
    const phone = document.getElementById('phone').value.trim();
    const code = document.getElementById('code').value.trim();

    if (!phone || !code) {
        alert('手机号和验证码不能为空');
        return;
    }

    const res = await fetch('/forget_password', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: new URLSearchParams({ phone, code })
    });
    const data = await res.json();

    if (data.msg === "验证通过") {
        window.location.href = '/reset_password';
    } else {
        alert(data.msg || "验证失败");
    }
}
    </script>
</body>
</html>
